<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แดชบอร์ด — ค่ายรักษ์พงไพร ไฮเทค</title>
<link rel="stylesheet" href="styles.css">
<style>
  .champion-banner {
    display: none;
    text-align: center;
    padding: 22px;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--gold), var(--gold-soft));
    color: var(--forest-deep);
    margin-bottom: 18px;
    font-family: 'Mitr';
    animation: pop .5s ease;
  }
  .champion-banner.show { display: block; }
  @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
  .stat-box { flex: 1; min-width: 120px; background: #fff; border-radius: 14px; padding: 14px; text-align: center; border: 1.5px solid var(--paper-dim); }
  .stat-box .num { font-family: 'Mitr'; font-size: 26px; color: var(--forest-deep); font-weight: 700; }
  .stat-box .label { font-size: 12px; color: var(--moss); margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="emoji">🌲</div>
    <div>
      <h1>ค่ายรักษ์พงไพร ไฮเทค</h1>
      <p>แดชบอร์ดคะแนนรวม (อัปเดตอัตโนมัติ)</p>
    </div>
    <nav>
      <a href="index.html">ตั้งค่ากลุ่ม</a>
      <a href="scan.html">สแกนให้คะแนน</a>
      <a href="dashboard.html" class="active">แดชบอร์ด</a>
    </nav>
  </div>

  <div class="champion-banner" id="championBanner">
    🏆 สุดยอดเยาวชนรักษ์พงไพร! 🏆<br>
    <span id="championNames" style="font-size:15px;font-weight:400;"></span>
  </div>

  <div class="stat-row">
    <div class="stat-box"><div class="num" id="statGroups">0</div><div class="label">กลุ่มทั้งหมด</div></div>
    <div class="stat-box"><div class="num" id="statComplete">0</div><div class="label">เก็บครบ 5 ฐาน</div></div>
    <div class="stat-box"><div class="num" id="statStars">0</div><div class="label">ดาวรวมทั้งค่าย</div></div>
  </div>

  <div class="card">
    <h2>🏅 อันดับกลุ่ม</h2>
    <div id="leaderboard"><div class="spinner"></div></div>
  </div>

</div>

<script src="config.js"></script>
<script>
const BASE_ORDER = ['base1', 'base2', 'base3', 'base4', 'base5'];

async function loadDashboard() {
  try {
    const res = await apiGet({ action: 'getDashboard' });
    if (!res.ok) { document.getElementById('leaderboard').innerHTML = `<div class="empty-state">โหลดไม่สำเร็จ: ${res.error}</div>`; return; }
    render(res.groups, res.scores, res.bases);
  } catch (err) {
    document.getElementById('leaderboard').innerHTML = `<div class="empty-state">เชื่อมต่อไม่ได้ ตรวจสอบ API_URL ใน config.js<br>${err}</div>`;
  }
}

function render(groups, scores, bases) {
  const baseById = {};
  bases.forEach(b => baseById[b.id] = b);

  const ranked = groups.map(g => {
    const gScores = scores.filter(s => s.groupId === g.groupId);
    const totalStars = gScores.reduce((sum, s) => sum + s.stars, 0);
    const iconsCollected = BASE_ORDER.filter(bid => gScores.some(s => s.baseId === bid));
    return {
      ...g,
      totalStars,
      basesCompleted: iconsCollected.length,
      icons: iconsCollected.map(bid => baseById[bid]?.icon || ''),
    };
  }).sort((a, b) => b.totalStars - a.totalStars || b.basesCompleted - a.basesCompleted);

  document.getElementById('statGroups').textContent = groups.length;
  document.getElementById('statComplete').textContent = ranked.filter(g => g.basesCompleted === 5).length;
  document.getElementById('statStars').textContent = ranked.reduce((s, g) => s + g.totalStars, 0);

  const champions = ranked.filter(g => g.basesCompleted === 5);
  const banner = document.getElementById('championBanner');
  if (champions.length > 0) {
    banner.classList.add('show');
    document.getElementById('championNames').textContent = champions.map(g => g.groupName).join(' • ');
  } else {
    banner.classList.remove('show');
  }

  const listEl = document.getElementById('leaderboard');
  if (ranked.length === 0) {
    listEl.innerHTML = '<div class="empty-state">ยังไม่มีกลุ่มในระบบ</div>';
    return;
  }

  listEl.innerHTML = '';
  ranked.forEach((g, i) => {
    const row = document.createElement('div');
    row.className = 'leaderboard-row' + (i === 0 && g.totalStars > 0 ? ' top1' : '');
    row.innerHTML = `
      <div class="rank">${i === 0 && g.totalStars > 0 ? '🥇' : i === 1 && g.totalStars > 0 ? '🥈' : i === 2 && g.totalStars > 0 ? '🥉' : (i + 1)}</div>
      <div class="info">
        <h3>${escapeHtml(g.groupName)}</h3>
        <div class="icons">${g.icons.join(' ') || '<span style="color:var(--paper-dim);font-size:12px;">ยังไม่มีไอคอน</span>'} <span class="pill" style="margin-left:6px;">${g.basesCompleted}/5 ฐาน</span></div>
      </div>
      <div class="stars">⭐ ${g.totalStars}</div>
    `;
    listEl.appendChild(row);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

loadDashboard();
setInterval(loadDashboard, 3000);
</script>
</body>
</html>
